<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Build & Links Storage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="drop-overlay" class="drop-overlay">
        <div class="drop-message">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Drop ZIP file to upload build</p>
        </div>
    </div>

    <header>
        <div class="header-content">
            <h1>Unity Build Storage</h1>
            <div id="auth-section">
                <input type="password" id="password-input" placeholder="Admin Password">
                <button id="login-btn">Login</button>
                <button id="logout-btn" style="display: none;" class="secondary-btn">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div id="admin-panel" style="display: none;" class="panel fade-in">
            <h2>Admin Controls</h2>

            <div class="admin-grid">
                <div class="admin-section">
                    <h3>Upload Build (ZIP)</h3>
                    <div class="input-stack">
                        <input type="text" id="event-name" placeholder="Event Name">
                        <input type="text" id="build-info" placeholder="Build Info">
                        <div class="input-group">
                            <input type="file" id="file-input" accept=".zip">
                            <button id="upload-file-btn" class="primary-btn">Upload to Cloud</button>
                        </div>
                    </div>
                    <div id="upload-progress-container" style="display: none;">
                        <div class="progress-bar">
                            <div id="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="admin-section">
                    <h3>Add Web Link</h3>
                    <div class="input-stack">
                        <input type="text" id="link-title" placeholder="Link Title">
                        <input type="url" id="link-url" placeholder="URL">
                        <button id="add-link-btn" class="primary-btn">Save Link</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-section">
            <div class="column">
                <div class="column-header">
                    <h2>Stored Builds</h2>
                    <div class="quick-filters">
                        <select id="quick-range-select" class="range-select">
                            <option value="all">All Time</option>
                            <option value="today">Today</option>
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                            <option value="6month">Last 6 Months</option>
                            <option value="year">Last Year</option>
                        </select>
                    </div>
                    <div class="date-filter">
                        <input type="date" id="start-date" title="Start Date">
                        <span class="date-sep">to</span>
                        <input type="date" id="end-date" title="End Date">
                    </div>
                    <button id="refresh-builds-btn" class="icon-btn" title="Refresh">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
                <div class="search-container">
                    <input type="text" id="build-search" placeholder="Search by event or build name..."
                        class="search-input">
                </div>
                <ul id="builds-list" class="list"></ul>
            </div>

            <div class="column">
                <div class="column-header">
                    <h2>Web Links</h2>
                </div>
                <ul id="links-list" class="list"></ul>
            </div>
        </div>
    </main>

    <!-- Custom Modal -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">Title</h3>
            <p id="modal-message">Message goes here.</p>
            <div id="modal-input-container" style="display: none;">
                <input type="password" id="modal-input" placeholder="Enter password...">
            </div>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="secondary-btn">Cancel</button>
                <button id="modal-confirm-btn" class="primary-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Build Details Modal -->
    <div id="build-details-modal" class="modal-overlay" style="display: none; z-index: 2000;">
        <div class="modal-content">
            <h3>Upload Build Details</h3>
            <p id="dropped-file-name" style="font-weight: 600; color: var(--primary); margin: 0.5rem 0 1.5rem 0; font-size: 0.9rem; text-align: center; background: #eef2ff; padding: 0.5rem; border-radius: 4px;"></p>
            <div class="input-stack" style="gap: 1rem; margin-bottom: 1.5rem;">
                <input type="text" id="modal-event-name" placeholder="Event Name (e.g. CES 2024)" style="width: 100%; box-sizing: border-box;">
                <input type="text" id="modal-build-info" placeholder="Build Info (e.g. v1.0.4 - WebGL)" style="width: 100%; box-sizing: border-box;">
            </div>
            <div class="modal-actions">
                <button id="build-modal-cancel-btn" class="secondary-btn">Cancel</button>
                <button id="build-modal-confirm-btn" class="primary-btn">Upload Build</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
